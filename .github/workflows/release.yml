name: Build and Release FFmpeg

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build FFmpeg (Windows)
        run: bash build-ffmpeg.sh
      - name: Create zip archive
        run: |
          mkdir -p dist
          cd /home/runner/mkv/ffmpeg-win-static
          zip -r ../../dist/ffmpeg-win-static.zip bin/ lib/ include/ LICENSE* 2>/dev/null || zip -r ../../dist/ffmpeg-win-static.zip .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win
          path: dist/ffmpeg-win-static.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build FFmpeg (Linux)
        run: bash build-ffmpeg-linux.sh
      - name: Create zip archive
        run: |
          mkdir -p dist
          cd /home/runner/ffmpeg-linux
          zip -r ../../dist/ffmpeg-linux-static.zip bin/ lib/ include/ LICENSE* 2>/dev/null || zip -r ../../dist/ffmpeg-linux-static.zip .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux
          path: dist/ffmpeg-linux-static.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build FFmpeg (Android)
        run: bash build-ffmpeg-android.sh
      - name: Create zip archive
        run: |
          mkdir -p dist
          cd /home/runner/ffmpeg-android
          zip -r ../../dist/ffmpeg-android.zip arm64-v8a armeabi-v7a 2>/dev/null || zip -r ../../dist/ffmpeg-android.zip .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android
          path: dist/ffmpeg-android.zip

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Debug - List Files
        run: |
          echo "Files to upload:"
          ls -la dist/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
