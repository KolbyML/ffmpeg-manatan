name: Build and Release FFmpeg

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build FFmpeg (Windows)
        run: bash build-ffmpeg.sh

      - name: Find and list output
        run: |
          echo "Contents of mkv dir:"
          ls -la /home/runner/mkv/ffmpeg-win-static/ 2>/dev/null || echo "Directory not found"

      - name: Create zip archive
        run: |
          mkdir -p output
          cd /home/runner/mkv/ffmpeg-win-static
          zip -r ../output/ffmpeg-win-static.zip bin/ lib/ include/ LICENSE* 2>/dev/null || zip -r ../output/ffmpeg-win-static.zip . 2>/dev/null || true

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/ffmpeg-win-static.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build FFmpeg (Linux)
        run: bash build-ffmpeg-linux.sh

      - name: Find and list output
        run: |
          echo "Contents of ffmpeg-linux dir:"
          ls -la /home/runner/ffmpeg-linux/ 2>/dev/null || echo "Directory not found"

      - name: Create zip archive
        run: |
          mkdir -p output
          cd /home/runner/ffmpeg-linux
          zip -r ../output/ffmpeg-linux-static.zip bin/ lib/ include/ LICENSE* 2>/dev/null || zip -r ../output/ffmpeg-linux-static.zip . 2>/dev/null || true

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/ffmpeg-linux-static.zip

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build FFmpeg (Android)
        run: bash build-ffmpeg-android.sh

      - name: Find and list output
        run: |
          echo "Contents of ffmpeg-android dir:"
          ls -la /home/runner/ffmpeg-android/ 2>/dev/null || echo "Directory not found"

      - name: Create zip archive
        run: |
          mkdir -p output
          cd /home/runner/ffmpeg-android
          zip -r ../output/ffmpeg-android.zip arm64-v8a armeabi-v7a

      - name: Verify zip file exists
        run: |
          echo "Verifying zip file..."
          ls -la output/ffmpeg-android.zip || { echo "ERROR: Zip file not found!"; exit 1; }

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: output/ffmpeg-android.zip
