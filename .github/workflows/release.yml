name: Build and Release FFmpeg

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            wget
            cmake
            make
            patch
            autoconf
            automake
            libtool
            pkgconf
            yasm
            nasm
            zip
            unzip
            tar
            xz
            mingw-w64-x86_64-toolchain

      - name: Build FFmpeg (Windows)
        env:
          SKIP_SYSTEM_DEPS: "1"
          RUN_HW_RUNTIME_SMOKE: "0"
        run: bash build-ffmpeg.sh

      - name: Smoke Test Windows FFmpeg features
        run: |
          ./ffmpeg-win-output/bin/ffmpeg.exe -hide_banner -encoders | grep -i "h264_nvenc"
          ./ffmpeg-win-output/bin/ffmpeg.exe -hide_banner -encoders | grep -i "h264_amf"
          ./ffmpeg-win-output/bin/ffmpeg.exe -hide_banner -hwaccels | grep -i "d3d11va"
          ./ffmpeg-win-output/bin/ffmpeg.exe -hide_banner -decoders | grep -i " hevc "

      - name: Verify Output
        run: |
          echo "📦 Build artifacts:"
          ls -la dist/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win
          path: dist/ffmpeg-win-static.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Build FFmpeg (Linux)
        run: bash build-ffmpeg-linux.sh
        
      - name: Verify Output
        run: |
          echo "📦 Build artifacts:"
          ls -la dist/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux
          path: dist/ffmpeg-linux-static.zip
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build FFmpeg (Android)
        run: bash build-ffmpeg-android.sh
        
      - name: Verify Output
        run: |
          echo "📦 Build artifacts:"
          ls -la dist/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android
          path: dist/ffmpeg-android.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build FFmpeg (macOS)
        run: bash build-ffmpeg-macos.sh
        
      - name: Verify Output
        run: |
          echo "📦 Build artifacts:"
          ls -la dist/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos
          path: dist/ffmpeg-macos.zip
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux, build-android, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List Release Files
        run: |
          echo "📦 Files to release:"
          ls -lah dist/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.zip
